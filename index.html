<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>اخبار  </title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap');
  :root {
    --bg:#080c14;--surface:#0f1623;--surface2:#161e2e;--border:#1e2d45;
    --accent:#3b82f6;--accent2:#6366f1;--text:#e2e8f0;--text-muted:#64748b;
    --text-dim:#94a3b8;--red:#ef4444;--tag-bg:#1e3a5f;--tag-color:#60a5fa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Vazirmatn',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 20%,#0f2040 0%,transparent 50%),
                     radial-gradient(ellipse at 80% 80%,#1a1040 0%,transparent 50%);}
  /* Lock */
  #lock-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .lock-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:48px 40px;width:100%;max-width:420px;text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,.5),0 0 0 1px rgba(59,130,246,.1);position:relative;overflow:hidden;}
  .lock-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .lock-icon{width:72px;height:72px;border-radius:50%;
    background:linear-gradient(135deg,#1e3a5f,#2d1b69);border:2px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 24px;
    box-shadow:0 8px 24px rgba(59,130,246,.2);}
  .lock-card h2{font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:8px;}
  .lock-card p{color:var(--text-muted);font-size:.9rem;margin-bottom:32px;line-height:1.6;}
  .input-wrap{position:relative;margin-bottom:16px;}
  .input-wrap input{width:100%;padding:14px 48px 14px 18px;border-radius:12px;
    border:1px solid var(--border);background:var(--bg);color:var(--text);
    font-size:1rem;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:.1em;}
  .input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
  .eye{position:absolute;left:14px;top:50%;transform:translateY(-50%);
    color:var(--text-muted);cursor:pointer;font-size:1.1rem;user-select:none;}
  .btn{width:100%;padding:14px;border-radius:12px;border:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;
    transition:opacity .2s,transform .1s;box-shadow:0 4px 15px rgba(59,130,246,.3);}
  .btn:hover{opacity:.9;transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn.loading{opacity:.7;cursor:not-allowed;}
  #error{margin-top:14px;font-size:.85rem;min-height:22px;color:var(--red);
    display:flex;align-items:center;justify-content:center;gap:6px;}
  /* Content */
  #content{display:none;}
  .top-bar{background:var(--surface);border-bottom:1px solid var(--border);
    padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
  .top-bar-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px;}
  .badge{background:var(--tag-bg);color:var(--tag-color);font-size:.7rem;
    padding:3px 10px;border-radius:20px;font-weight:500;}
  .top-bar-meta{font-size:.78rem;color:var(--text-muted);}
  .page-body{max-width:860px;margin:0 auto;padding:32px 20px 60px;}
  .page-header{margin-bottom:28px;}
  .page-header h1{font-size:1.8rem;font-weight:700;letter-spacing:-.03em;margin-bottom:6px;}
  .page-header .sub{color:var(--text-muted);font-size:.9rem;}
  .stats-row{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
  .chip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:10px 18px;font-size:.82rem;color:var(--text-dim);display:flex;align-items:center;gap:8px;}
  .chip span{color:var(--text);font-weight:600;}
  /* Card */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    margin-bottom:20px;overflow:hidden;transition:border-color .2s,transform .2s;}
  .card:hover{border-color:#2a4a7a;transform:translateY(-2px);}
  .card-head{padding:22px 24px 16px;border-bottom:1px solid var(--border);}
  .card-num{font-size:.72rem;color:var(--accent);font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
  .card-title{font-size:1.05rem;font-weight:700;line-height:1.5;margin-bottom:12px;}
  .card-title a{color:var(--text);text-decoration:none;}
  .card-title a:hover{color:var(--accent);}
  .tags{display:flex;gap:8px;flex-wrap:wrap;}
  .tag{background:var(--tag-bg);color:var(--tag-color);font-size:.72rem;
    padding:3px 10px;border-radius:20px;font-weight:500;}
  .tag.green{background:#1a2a1a;color:#4ade80;}
  .card-body{padding:20px 24px;}
  .card-body p{line-height:1.9;color:var(--text-dim);margin-bottom:10px;font-size:.95rem;}
  .card-body p:last-child{margin-bottom:0;}
  .card-foot{padding:14px 24px;background:var(--surface2);
    border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .card-foot .src{font-size:.8rem;color:var(--text-muted);}
  .read-more{font-size:.8rem;color:var(--accent);text-decoration:none;
    display:flex;align-items:center;gap:5px;font-weight:500;}
  .read-more:hover{color:#60a5fa;}
</style>
</head>
<body>
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <h2>اخبار</h2>
    <p>این صفحه رمزنگاری شده است.<br>پسورد خود را برای مشاهده وارد کنید.</p>
    <div class="input-wrap">
      <input type="password" id="pwd" placeholder="• • • • • • • •" autofocus>
      <span class="eye" onclick="togglePwd()" id="eye-icon">👁</span>
    </div>
    <button class="btn" onclick="unlock()" id="unlock-btn">ورود به صفحه</button>
    <div id="error"></div>
  </div>
</div>
<div id="content">
  <div class="top-bar">
    <div class="top-bar-title">🗳️اخبار <span class="badge">رمزنگاری‌شده</span></div>
    <div class="top-bar-meta" id="update-time"></div>
  </div>
  <div class="page-body">
    <div class="page-header">
      <h1>📡 آخرین اخبار سیاسی</h1>
      <p class="sub">ترجمه و خلاصه‌سازی خودکار از منابع معتبر بین‌المللی</p>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div id="posts"></div>
  </div>
</div>

const LS_KEY='news_pwd';
function togglePwd(){const i=document.getElementById('pwd'),e=document.getElementById('eye-icon');
  i.type=i.type==='password'?'text':'password';e.textContent=i.type==='password'?'👁':'🙈';}
async function tryUnlock(pwd,silent=false){
  const btn=document.getElementById('unlock-btn'),err=document.getElementById('error');
  try{
    const text=await decrypt(ENCRYPTED,pwd);
    renderMarkdown(text);
    localStorage.setItem(LS_KEY,pwd);
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('content').style.display='block';
    return true;
  }catch(e){
    if(!silent){err.innerHTML='❌ پسورد اشتباه است';btn.textContent='ورود به صفحه';btn.classList.remove('loading');}
    return false;
  }
}
async function unlock(){
  const pwd=document.getElementById('pwd').value,btn=document.getElementById('unlock-btn'),err=document.getElementById('error');
  if(!pwd)return;btn.textContent='در حال بررسی...';btn.classList.add('loading');err.innerHTML='';
  await tryUnlock(pwd,false);
}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
// اگه پسورد در مرورگر ذخیره بود، خودکار وارد می‌شه
(async()=>{
  const saved=localStorage.getItem(LS_KEY);
  if(saved){
    const ok=await tryUnlock(saved,true);
    if(!ok)localStorage.removeItem(LS_KEY);
  }
})();
async function decrypt(b64,password){
  const data=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const salt=data.slice(0,16),iv=data.slice(16,28),ct=data.slice(28);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(plain);
}
function renderMarkdown(md){
  const lines=md.split('\n');let posts=[],cur=null,updateTime='';
  for(const line of lines){
    if(line.startsWith('_')&&line.endsWith('_')){updateTime=line.slice(1,-1);}
    else if(line.startsWith('## ')){if(cur)posts.push(cur);cur={title:line.slice(3).replace(/^\d+\.\s*/,''),link:'',source:'',date:'',body:[]}; }
    else if(cur&&line.startsWith('🔗 ')){const m=line.match(/\(([^)]+)\)/);if(m)cur.link=m[1];}
    else if(cur&&line.startsWith('📰 ')){const s=line.match(/\*\*([^*]+)\*\*/),d=line.match(/🕐 (.+)/);if(s)cur.source=s[1];if(d)cur.date=d[1].trim();}
    else if(cur&&line!=='---'&&line.trim()){cur.body.push(line.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'));}
  }
  if(cur)posts.push(cur);
  if(updateTime)document.getElementById('update-time').textContent='🕐 '+updateTime;
  document.getElementById('stats-row').innerHTML=
    `<div class="chip">📰 تعداد خبر: <span>${posts.length}</span></div>`+
    `<div class="chip">🕐 آخرین بروزرسانی: <span>${updateTime||'-'}</span></div>`;
  document.getElementById('posts').innerHTML=posts.map((p,i)=>`
    <div class="card">
      <div class="card-head">
        <div class="card-num">خبر ${i+1}</div>
        <div class="card-title">${p.link?`<a href="${p.link}" target="_blank">${p.title}</a>`:p.title}</div>
        <div class="tags">
          ${p.source?`<span class="tag">📰 ${p.source}</span>`:''}
          ${p.date?`<span class="tag green">🕐 ${p.date}</span>`:''}
        </div>
      </div>
      <div class="card-body">${p.body.map(l=>`<p>${l}</p>`).join('')}</div>
      <div class="card-foot">
        <span class="src">${p.source}</span>
        ${p.link?`<a href="${p.link}" target="_blank" class="read-more">خواندن خبر کامل ↗</a>`:''}
      </div>
    </div>`).join('');
}
</script>
